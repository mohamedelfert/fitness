name: fitness-os

# Local dev stack. Real MySQL 8 (prod parity — local host MariaDB is only a fallback).
# Host ports are env-overridable (defaults chosen to dodge common clashes). If a port
# is taken, set it in a root .env file, e.g.  MYSQL_PORT=3311  — the app containers talk
# to each other over the internal network, so host ports only affect host-side tools.
services:
  api:
    build:
      context: ./infra/docker/php
    working_dir: /app
    volumes:
      - ./apps/api:/app
      - ./apps/api/.env.docker:/app/.env   # container config; host .env stays for host dev
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "php artisan filament:assets && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build:
      context: ./infra/docker/php
    working_dir: /app
    volumes:
      - ./apps/api:/app
      - ./apps/api/.env.docker:/app/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan queue:work --tries=3

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: fitness_os
      MYSQL_USER: fitness
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "${MYSQL_PORT:-3310}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: masterKey
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili-data:/meili_data

  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP

volumes:
  mysql-data:
  meili-data:
